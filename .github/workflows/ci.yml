name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Lint example profiles
        run: python tools/profile.py lint profiles/*.json
      - name: Render smoke test
        run: python tools/profile.py render profiles/tech-generalist.json --out build/ci-smoke

  browser:
    name: Browser renderer parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check docs/renderer.js
          node --check docs/app.js
          node --check tests/render_profile.js
      - name: Compare browser and Python renderers
        run: python tests/check_renderer_parity.py
